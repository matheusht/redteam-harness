case: rotation-case-01-web-api

# ROTATION case (not the original live case). Web/API archetypes seeded from public web-security shapes — inspiration
# only, no flags / challenge names / solutions / challenge text vendored. Seed source acknowledged in
# case.yml. Purpose: test whether the router generalizes to a NEW surface (a billing/profile API)
# without memorizing the first agentic-chat case. Each positive has a held/refuted sibling, plus one
# deliberate coverage-gap (SSRF) that NO current pattern card covers.
signals:
  - observation: "a request includes a record id (invoiceId) in the query that selects which account's invoice is returned"
    where: billing_api request
    activates: [pattern.client-supplied-selector-authz]
    strength: strong
    note: "client-supplied selector chooses whose invoice — re-resolve from the principal"

  - observation: "the invoice endpoint resolves the owner from the authenticated session and ignores any supplied id"
    where: billing_api request
    activates: [pattern.client-supplied-selector-authz]
    strength: negative
    note: "held — the correct counterpart; record as the negative example"

  - observation: "a search parameter is concatenated into a SQL query string built by hand"
    where: search_api
    activates: [pattern.transitive-sanitizer-reliance]
    strength: strong
    note: "truly unsafe sink (hand-built SQL string) — strong; prove execution with a benign query canary"

  - observation: "the same search uses parameterized / prepared statements with bound variables"
    where: search_api
    activates: [pattern.transitive-sanitizer-reliance]
    strength: negative
    note: "held — the sink binds input server-side; defense holds"

  - observation: "stored profile text is rendered back through an auto-escaping template engine"
    where: profile_render
    activates: [pattern.transitive-sanitizer-reliance]
    strength: negative
    note: "auto-escaping is stated → the held/refuted render sibling (defense present); default verdict refuted"

  - observation: "the server fetches a URL supplied in the request body to import an avatar image"
    where: avatar_import
    activates: []
    strength: none
    coverage_gap: true
    note: "SSRF — NO current pattern card covers this. Expected behaviour: flag a COVERAGE GAP; do NOT force-fit an authz/injection card."
