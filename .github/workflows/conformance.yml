name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install pinned conformance dependencies
        run: python3 -m pip install --disable-pip-version-check -r requirements-ci.txt
      - name: Decision 0005 engagement-record schema gate (self-test)
        run: python3 tools/run-engagement.py --self-test
      - name: Decision 0005 migration dry-run and reviewed-apply gate (self-test)
        run: python3 tools/migrate-decision5.py --self-test
      - name: Structural conformance (cards, routes, casebooks, secrets, evidence contract, corpora)
        run: python3 tools/check-conformance.py
      - name: Campaign / candidate contract gate (self-test)
        run: python3 tools/check-campaign.py --self-test
      - name: Campaign input hasher (self-test)
        run: python3 tools/hash-campaign-inputs.py --self-test
      - name: GEPA shadow runner (self-test)
        run: python3 tools/run-gepa-shadow.py --self-test
      - name: GEPA Phase 8 adapter (self-test)
        run: python3 tools/run-gepa-real.py --self-test
      - name: GEPA Phase 9 candidate-applied evaluation (self-test)
        run: python3 tools/apply-candidate-eval.py --self-test
      - name: GEPA Phase 10 blind behavioral evaluator (self-test)
        run: python3 tools/run-behavioral-eval.py --self-test
      - name: GEPA Phase 10G researcher adapter contract (self-test)
        run: python3 tools/researcher_adapter.py --self-test
      - name: Keep/discard candidate policy (self-test)
        run: python3 tools/score-candidate.py --self-test
      - name: Replay & variance gate (self-test)
        run: python3 tools/replay-candidate.py --self-test
      - name: Promotion bundle renderer (self-test)
        run: python3 tools/render-promotion-bundle.py --self-test
      - name: Canonical experiment lifecycle entrypoint (self-test)
        run: python3 tools/run-experiment-lifecycle.py --self-test
      - name: DSPy spike — routing normalizer baseline (deterministic, self-test)
        run: python3 experiments/dspy-routing-normalizer/normalize.py --self-test
      # Frozen-input integrity is gated against the CURRENT canonical campaign, not historical
      # revisions. Revision 3 rotates the checker pin for Decision 0005 full-schema validation; revision
      # 2 remains immutable and superseded. The gepa-shadow campaigns (Phase 8 / 2026-06-26) are archived:
      # their frozen_inputs pin
      # Phase-8-era tool and gold hashes that later evaluator hardening (10F/10G/10H0) and gold rotation
      # legitimately drifted — the drift detector working as designed. See each campaign's SUPERSEDED.md.
      # Re-pinning historical revisions to silence CI is forbidden (it would rewrite superseded history).
      - name: Canonical behavioral campaign frozen-input integrity
        run: python3 tools/hash-campaign-inputs.py --check evals/behavioral/campaigns/behavioral-canonical-v3-2026-07-10/campaign-manifest.json
      # The promotion bundle hash-pin / drift machinery is exercised by render-promotion-bundle --self-test
      # (verify_drift: intact -> clean, tampered gold -> drift). There is no live promotion bundle to pin
      # against until a real-model qualification produces one.
      - name: Mechanical routing scorer (self-test)
        run: python3 tools/score-routing.py --self-test
      - name: False-discovery scorer (self-test)
        run: python3 tools/score-false-discovery.py --self-test
      - name: Hermetic no-model BOLA benchmark (self-test)
        run: python3 tools/run-hermetic-bola.py --self-test
      - name: Hermetic fake-model benchmarks (LLM05/06/07 + router, self-test)
        run: python3 tools/run-hermetic-fakemodel.py --self-test
      - name: Hermetic API-security benchmarks (Track D, self-test)
        run: python3 tools/run-hermetic-api.py --self-test
      - name: Evaluator qualification runner (self-test)
        run: python3 tools/run-qualification.py --self-test
      - name: E-track converters + sensors (self-tests)
        run: |
          python3 tools/obfuscation-converter.py --self-test
          python3 tools/stego-converter.py --self-test
          python3 tools/covert-channel-converter.py --self-test
          python3 tools/covert-channel-evidence.py --self-test
          python3 tools/tollbooth-digest-adapter.py --self-test
          python3 tools/casebook-retrieval-index.py --self-test
          python3 tools/encoding-robustness-eval.py --self-test
      - name: Payload-generator lane (PG-3A self-tests)
        run: |
          python3 tools/generate-payload-proposal.py --self-test
          python3 tools/payload-proposal-hermetic-test.py --self-test
