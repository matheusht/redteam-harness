name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Structural conformance (cards, routes, casebooks, secrets)
        run: python3 tools/check-conformance.py
