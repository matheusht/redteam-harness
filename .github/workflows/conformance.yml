name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Structural conformance (cards, routes, casebooks, secrets, evidence contract, corpora)
        run: python3 tools/check-conformance.py
      - name: Campaign / candidate contract gate (self-test)
        run: python3 tools/check-campaign.py --self-test
      - name: Campaign input hasher (self-test)
        run: python3 tools/hash-campaign-inputs.py --self-test
      - name: GEPA shadow runner (self-test)
        run: python3 tools/run-gepa-shadow.py --self-test
      - name: GEPA Phase 8 adapter (self-test)
        run: python3 tools/run-gepa-real.py --self-test
      - name: GEPA Phase 9 candidate-applied evaluation (self-test)
        run: python3 tools/apply-candidate-eval.py --self-test
      - name: Keep/discard candidate policy (self-test)
        run: python3 tools/score-candidate.py --self-test
      - name: Replay & variance gate (self-test)
        run: python3 tools/replay-candidate.py --self-test
      - name: Promotion bundle renderer (self-test)
        run: python3 tools/render-promotion-bundle.py --self-test
      - name: DSPy spike — routing normalizer baseline (deterministic, self-test)
        run: python3 experiments/dspy-routing-normalizer/normalize.py --self-test
      - name: Phase 8 adapter campaign frozen-input integrity
        run: python3 tools/hash-campaign-inputs.py --check evals/gepa-shadow/campaigns/gepa-phase8-2026-06-26/campaign-manifest.json
      - name: Phase 8 promotion bundle hash-pin integrity
        run: python3 tools/render-promotion-bundle.py --verify evals/gepa-shadow/campaigns/gepa-phase8-2026-06-26/candidates/cand-gepa-task-reframing-001/promotion/promotion-bundle.json
      - name: Mechanical routing scorer (self-test)
        run: python3 tools/score-routing.py --self-test
      - name: False-discovery scorer (self-test)
        run: python3 tools/score-false-discovery.py --self-test
      - name: Hermetic no-model BOLA benchmark (self-test)
        run: python3 tools/run-hermetic-bola.py --self-test
      - name: Hermetic fake-model benchmarks (LLM05/06/07 + router, self-test)
        run: python3 tools/run-hermetic-fakemodel.py --self-test
      - name: Evaluator qualification runner (self-test)
        run: python3 tools/run-qualification.py --self-test
